<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fireproject</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <span id="headingspan"><h1 id="headline">Orbit's interface </h1></span>
    <h2 id="headline2">Control Orbit</h2>
    <div id="mainbox">
    <label for="inputmessage" id="messagelabel">
        <span id="statusdot"></span>
        Talk with Orbit</label><br>
    <input type="text" id="inputmessage" placeholder="type your message here" required> <br>
    <input type="submit" value="SEND" id="sendbutton">
</div>
<div id="motorcontrols">
<button id="btnforwards" class="Controlbuttons">&uarr;</button><br>
<button id="btnleft" class="Controlbuttons">&larr;</button>
<button id="btnbackwards" class="Controlbuttons">&darr;</button>
<button id="btnright" class="Controlbuttons">&rarr;</button>
</div>
<h3 id="webcamheading">  Gesture Controls , For Black Color</h3>
<video id="camera" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<script src="script.js"></script>
</body>
</html>
